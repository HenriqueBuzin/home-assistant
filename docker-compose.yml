services:
  hm-fln:
    container_name: ha-fln
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
    volumes:
      - ./ha-fln-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - proxy-network

  hm-cxs:
    container_name: ha-cxs
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:8124:8123"
    volumes:
      - ./ha-cxs-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
