services:
  ha-fln:
    build: .
    image: ha-custom
    container_name: ha-fln
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"
    volumes:
      - ./ha-fln-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - proxy-network

  ha-cxs:
    image: ha-custom
    container_name: ha-cxs
    restart: unless-stopped
    ports:
      - "127.0.0.1:8124:8123"
    volumes:
      - ./ha-cxs-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - proxy-network

  ha-fln-dev:
    image: ha-custom
    container_name: ha-fln-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8125:8123"
    volumes:
      - ./ha-fln-dev-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - proxy-network

  ha-cxs-dev:
    image: ha-custom
    container_name: ha-cxs-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8126:8123"
    volumes:
      - ./ha-cxs-dev-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
    